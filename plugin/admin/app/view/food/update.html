<body>

        <div class="main-container mr-5">
            <div class="layui-form-item">
                <label class="layui-form-label required">食物名称</label>
                <div class="layui-input-block">
                    <input type="text" name="name" required lay-verify="required" class="layui-input">

            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">食物分类</label>
                <div class="layui-input-block">
                    <div id="cat_id"></div>
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">所属用户</label>
                <div class="layui-input-block">

            <div class="layui-form-item">
                <label class="layui-form-label">状态</label>
                <div class="layui-input-block">
                    <input type="checkbox" id="status_switch" lay-filter="status_switch" lay-skin="switch" />

            <fieldset class="layui-elem-field">
                <legend>营养信息 / 100g</legend>
                <div class="layui-field-box">
                    <div class="layui-form-item">
                        <?php

            <button type="submit" class="pear-btn pear-btn-primary" lay-submit lay-filter="save">提交更新</button>

<script src="/app/admin/component/layui/layui.js?v=2.8.12"></script>
<script src="/app/admin/component/pear/pear.js"></script>

<script>
    const PRIMARY_KEY = "id";
    const SELECT_API = "/app/admin/food/select" + location.search;
    const UPDATE_API = "/app/admin/food/update";

    layui.use(["form", "jquery", "xmSelect", "popup"], function () {
        let $ = layui.$;
        let form = layui.form;
        let xmSelect = layui.xmSelect;

        // 1. 获取数据并填充
        $.ajax({
            url: SELECT_API,
            dataType: "json",
            success: function (res) {
                if (res.code) return layui.popup.failure(res.msg);

                const row = res.data[0];

                // 填充基础字段 (name, status 等)
                form.val("food-form", {
                    "name": row.name,
                    "status": row.status
                });

                // 处理状态开关回显
                $("#status_switch").prop("checked", row.status == 1);

                // 填充营养指标 (重点：遍历关联的 nutrients 对象)
                if (row.nutrients) {
                    let nutrientData = {};
                    for (let key in row.nutrients) {
                        nutrientData["nutrients[" + key + "]"] = row.nutrients[key];
                    }
                    form.val("food-form", nutrientData);
                }

                // 2. 加载分类下拉
                $.get("/app/admin/cat/select?format=select&limit=1000", function(catRes) {
                    xmSelect.render({
                        el: "#cat_id",
                        name: "cat_id",
                        initValue: row.cat_id ? [row.cat_id] : [],
                        data: catRes.data,
                        radio: true,
                        clickClose: true,
                        model: { icon: "hidden", label: { type: "text" } }
                    });
                });

                // 3. 加载用户下拉
                $.get("/app/admin/user/select?format=select", function(userRes) {
                    xmSelect.render({
                        el: "#user_id",
                        name: "user_id",
                        initValue: row.user_id ? [row.user_id] : [],
                        data: userRes.data,
                        radio: true,
                        clickClose: true,
                        model: { icon: "hidden", label: { type: "text" } }
                    });
                });

                form.render();
            }
        });

        // 状态开关监听
        form.on("switch(status_switch)", function(data) {
            $('input[name="status"]').val(this.checked ? 1 : 0);
        });

        // 提交事件
        form.on("submit(save)", function (data) {
            // 注入主键 ID
            data.field[PRIMARY_KEY] = layui.url().search[PRIMARY_KEY];

            $.ajax({
                url: UPDATE_API,
                type: "POST",
                data: data.field,
                success: function (res) {
                    if (res.code) return layui.popup.failure(res.msg);
                    layui.popup.success("更新成功", function () {
                        parent.refreshTable();
                        parent.layer.close(parent.layer.getFrameIndex(window.name));
                    });
                }
            });
            return false;
        });
    });
</script>
</body>
</html>
