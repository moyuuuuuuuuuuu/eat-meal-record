# 1. 跨域 Origin 映射
map $http_origin $cors_origin {
    default "";
    "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$" "$http_origin";
    "~^https?://.*\.moyuu\.cn$" "$http_origin";
}

# 2. HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name eat.test;
    return 301 https://$host$request_uri;
}

# 3. 主 HTTPS 服务
server {
    listen 443 ssl;
    server_name eat.test;
    index index.php index.html;


    # SSL 证书路径 (请替换为容器内的实际路径)
    ssl_certificate     /ssl/eatclear.moyuu.cn/ssl.pem;
    ssl_certificate_key /ssl/eatclear.moyuu.cn/ssl.key;

    # SSL 配置
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    # 性能与安全优化
    client_max_body_size 10M; # 建议增加，防止图片上传 413 错误
    error_log /var/log/nginx/nginx.eat-clear.error.log;
    access_log /var/log/nginx/nginx.eat-clear.access.log;

    # 定义通用的响应头变量，避免在每个 location 里重复 add_header
    set $cors_methods 'GET, POST, OPTIONS, PUT, DELETE';
    set $cors_headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';

    # 拦截所有 OPTIONS 请求（预检）
    # 放在 server 级别可以覆盖所有下属 location，除非子 location 另有定义
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # 使用 add_header 的 always 参数确保在错误响应时也能带上跨域头
    add_header 'Access-Control-Allow-Origin' $cors_origin always;
    add_header 'Access-Control-Allow-Methods' $cors_methods always;
    add_header 'Access-Control-Allow-Headers' $cors_headers always;
    add_header 'Access-Control-Allow-Credentials' 'true' always;
    add_header 'Access-Control-Max-Age' 1728000 always;

    # 公共代理设置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;


    location /api/food/recognize {
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_pass http://php82:8787;
    }

    location / {
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://php82:8787;
    }


    # 禁止访问所有以点 (.) 开头的文件
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 禁止访问敏感后缀文件
    location ~* \.(config|ini|conf|log|bak|sql|env|yaml|yml|git)$ {
        deny all;
    }
}
